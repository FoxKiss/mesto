<!DOCTYPE html>
<html class="html" lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesto</title>
</head>

<body>
  <div class="page">
    <header class="header">
      <img class="header__logo" src="<%=require('./images/logo.svg')%>" alt="Логотип 'Место'">

    </header>
    <main class="content">
      <section class="profile">
        <div class="profile__info">
          <img class="profile__avatar" src="<%=require('./images/FeLQiUbiXqU.jpg')%>" alt="Аватар Профиля">
          <div>
            <h1 class="profile__name">Арсений</h1>
            <p class="profile__profesion">Aspring Web-Developer</p>
          </div>
          <button id="profileEditButton" type="button" class="profile__edit-button"></button>
        </div>
        <button id="cardsEditButton" type="button" class="profile__add-button"><img class="profile__vector-button"
            src="<%=require('./images/vector.svg')%>" alt="Редактировать"></button>
      </section>
      <section class="elements">
        <ul class="elements__list">
        </ul>
      </section>
    </main>
    <footer class="footer">
      <p class="footer__copyright">© 2020 Mesto Russia</p>
    </footer>
    <div id="profileEdit" class="popup popup-profile">
      <div class="popup__container">
        <h2 class="popup__text">Редактировать профиль</h2>
        <form id="profileForm" class="popup__form" novalidate>
          <label class="popup__input-label">
            <input minlength="2" maxlength="40" required id="name-input" name="name" type="text" placeholder="Введите своё Имя"
              class="popup__input popup__input_type_name">
            <span class="popup__input-error name-input-error"></span>
          </label>
          <label class="popup__input-label">
            <input minlength="2" maxlength="200" name="hobby" required id="hobby-input" placeholder="О себе" type="text"
              class="popup__input  popup__input_type_hobby">
            <span class="popup__input-error hobby-input-error"></span>
          </label>
          <button id="profileSubmitButton" type="submit" class="popup__submit-button">Сохранить</button>
        </form>
        <button id="profileClose" type="button" class="popup__close-button"></button>
      </div>
    </div>
    <div id="cardsEdit" class="popup popup-cards">
      <div class="popup__container">
        <h2 class="popup__text">Новое место</h2>
        <form id="cardsForm" class="popup__form" novalidate>
          <label class="popup__input-label">
            <input minlength="2" maxlength="30" required id="place-input" name="place" type="text" placeholder="Название"
              class="popup__input popup__input_cards-name ">
            <span class="popup__input-error place-input-error"></span>
          </label>
          <label class="popup__input-label">
            <input required id="link-input" name="link" placeholder="Ссылка на картинку" type="url"
              class="popup__input  popup__input_cards-link">
            <span class="popup__input-error link-input-error"></span>
          </label>
          <button id="cardsSubmitButton" type="submit" class="popup__submit-button">Создать</button>
        </form>
        <button id="cardsClose" type="button" class="popup__close-button"></button>
      </div>
    </div>
    <div id="imagesPop" class="popup popup-images">
      <div class="popup__images-container">
        <button id="imagesPopClose" type="button" class="popup__close-button"></button>
        <img class="popup__images-properties" src="." alt=".">
        <p class="popup__images-text"></p>
      </div>
    </div>
  </div>
  <template id="cardsTemplate">
    <li id="cardsElement" class="elements__cards">
      <button class="elements__delete"></button>
      <img class="elements__image" src=".">
      <div class="elements__name">
        <h2 class="elements__name-text"></h2>
        <button type="button" class="elements__like-button"></button>
      </div>
    </li>
  </template>
</body>

</html>
